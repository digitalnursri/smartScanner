<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NSE Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}

        body{
            font-family:'Inter',sans-serif;
            min-height:100vh;
            display:flex;
            align-items:center;
            justify-content:center;
            background:#0a0a0f;
            overflow:hidden;
            position:relative;
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-gradient{
            position:fixed;inset:0;z-index:0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 80%, rgba(255,108,55,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 80% at 80% 20%, rgba(79,168,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 50% at 50% 50%, rgba(179,136,255,0.05) 0%, transparent 60%);
        }

        .grid-overlay{
            position:fixed;inset:0;z-index:1;
            background-image:
                linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
            background-size:60px 60px;
        }

        /* Floating particles */
        .particle{
            position:fixed;
            border-radius:50%;
            pointer-events:none;
            z-index:1;
            animation:float linear infinite;
        }
        @keyframes float{
            0%{transform:translateY(100vh) scale(0);opacity:0}
            10%{opacity:1}
            90%{opacity:1}
            100%{transform:translateY(-10vh) scale(1);opacity:0}
        }

        /* ===== LOGIN CARD ===== */
        .login-container{
            position:relative;z-index:10;
            width:100%;max-width:420px;
            padding:20px;
        }

        .login-card{
            background:rgba(28,28,34,0.85);
            backdrop-filter:blur(24px) saturate(1.4);
            -webkit-backdrop-filter:blur(24px) saturate(1.4);
            border:1px solid rgba(255,255,255,0.06);
            border-radius:20px;
            padding:44px 36px 36px;
            box-shadow:
                0 0 0 1px rgba(255,108,55,0.04),
                0 20px 60px rgba(0,0,0,0.5),
                0 0 120px rgba(255,108,55,0.03);
            position:relative;
            overflow:hidden;
        }

        .login-card::before{
            content:'';
            position:absolute;top:-1px;left:20%;right:20%;height:2px;
            background:linear-gradient(90deg,transparent,rgba(255,108,55,0.6),transparent);
            border-radius:2px;
        }

        /* Logo */
        .logo-wrap{
            text-align:center;margin-bottom:32px;
        }
        .logo-icon{
            width:56px;height:56px;
            background:linear-gradient(135deg,#ff6c37 0%,#ff8c5a 100%);
            border-radius:16px;
            display:inline-flex;align-items:center;justify-content:center;
            margin-bottom:16px;
            box-shadow:0 8px 32px rgba(255,108,55,0.25);
            animation:logoPulse 3s ease-in-out infinite;
        }
        @keyframes logoPulse{
            0%,100%{box-shadow:0 8px 32px rgba(255,108,55,0.25)}
            50%{box-shadow:0 8px 48px rgba(255,108,55,0.4)}
        }
        .logo-icon svg{width:28px;height:28px;color:#fff}
        .logo-title{
            font-size:22px;font-weight:800;
            background:linear-gradient(135deg,#fff 0%,#ccc 100%);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
            letter-spacing:-0.5px;
        }
        .logo-sub{
            font-size:12px;color:#6b6b6b;margin-top:4px;font-weight:500;
            letter-spacing:0.5px;
        }

        /* Form */
        .form-group{
            margin-bottom:20px;position:relative;
        }
        .form-label{
            display:block;font-size:11px;font-weight:600;
            color:#888;text-transform:uppercase;letter-spacing:1px;
            margin-bottom:8px;
        }
        .input-wrap{
            position:relative;
        }
        .input-icon{
            position:absolute;left:14px;top:50%;transform:translateY(-50%);
            width:18px;height:18px;color:#555;pointer-events:none;
            transition:color 0.2s;
        }
        .form-input{
            width:100%;
            background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.08);
            color:#e0e0e0;
            padding:14px 14px 14px 44px;
            border-radius:12px;
            font-size:14px;font-weight:500;
            font-family:'Inter',sans-serif;
            outline:none;
            transition:all 0.25s ease;
        }
        .form-input::placeholder{color:#4a4a4a}
        .form-input:focus{
            border-color:rgba(255,108,55,0.5);
            background:rgba(255,108,55,0.04);
            box-shadow:0 0 0 3px rgba(255,108,55,0.08);
        }
        .form-input:focus ~ .input-icon,
        .form-input:focus + .input-icon{
            color:#ff6c37;
        }

        /* Password toggle */
        .pass-toggle{
            position:absolute;right:14px;top:50%;transform:translateY(-50%);
            background:none;border:none;color:#555;cursor:pointer;
            padding:4px;display:flex;transition:color 0.2s;
        }
        .pass-toggle:hover{color:#ff6c37}
        .pass-toggle svg{width:18px;height:18px}

        /* Button */
        .login-btn{
            width:100%;
            padding:15px;
            background:linear-gradient(135deg,#ff6c37 0%,#e55a2b 100%);
            border:none;
            border-radius:12px;
            color:#fff;
            font-size:15px;font-weight:700;
            font-family:'Inter',sans-serif;
            cursor:pointer;
            transition:all 0.25s ease;
            position:relative;
            overflow:hidden;
            letter-spacing:0.3px;
            margin-top:8px;
        }
        .login-btn::before{
            content:'';
            position:absolute;inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,0.15) 0%,transparent 60%);
            opacity:0;transition:opacity 0.25s;
        }
        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(255,108,55,0.35);
        }
        .login-btn:hover::before{opacity:1}
        .login-btn:active{
            transform:translateY(0);
            box-shadow:0 4px 16px rgba(255,108,55,0.25);
        }
        .login-btn:disabled{
            opacity:0.6;cursor:not-allowed;transform:none !important;
            box-shadow:none !important;
        }

        /* Loading spinner in button */
        .btn-spinner{
            display:inline-block;width:18px;height:18px;
            border:2px solid rgba(255,255,255,0.3);
            border-top-color:#fff;
            border-radius:50%;
            animation:spin 0.6s linear infinite;
            vertical-align:middle;
            margin-right:8px;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        /* Error message */
        .error-msg{
            background:rgba(255,82,82,0.08);
            border:1px solid rgba(255,82,82,0.2);
            color:#ff6b6b;
            padding:10px 14px;
            border-radius:10px;
            font-size:13px;font-weight:500;
            margin-bottom:20px;
            display:none;
            align-items:center;gap:8px;
            animation:shakeIn 0.4s ease;
        }
        .error-msg.visible{display:flex}
        @keyframes shakeIn{
            0%,100%{transform:translateX(0)}
            20%{transform:translateX(-8px)}
            40%{transform:translateX(8px)}
            60%{transform:translateX(-4px)}
            80%{transform:translateX(4px)}
        }
        .error-msg svg{flex-shrink:0;width:16px;height:16px}

        /* Footer */
        .login-footer{
            text-align:center;margin-top:24px;
            font-size:11px;color:#444;font-weight:500;
        }
        .login-footer span{color:#ff6c37}
    </style>
</head>
<body>
    <!-- Background effects -->
    <div class="bg-gradient"></div>
    <div class="grid-overlay"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Logo -->
            <div class="logo-wrap">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M3 3h18v18H3z"/><path d="M3 15l5-5 4 4 6-8"/>
                    </svg>
                </div>
                <div class="logo-title">NSE Screener</div>
                <div class="logo-sub">Stock Intelligence Platform</div>
            </div>

            <!-- Error -->
            <div class="error-msg" id="errorMsg">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
                </svg>
                <span id="errorText">Invalid credentials</span>
            </div>

            <!-- Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <div class="input-wrap">
                        <input type="text" class="form-input" id="username" placeholder="Enter username" autocomplete="username" autofocus required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-wrap">
                        <input type="password" class="form-input" id="password" placeholder="Enter password" autocomplete="current-password" required>
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/>
                        </svg>
                        <button type="button" class="pass-toggle" onclick="togglePassword()" tabindex="-1">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                Secured Access &bull; <span>SmartScanner</span>
            </div>
        </div>
    </div>

    <script>
        // ===== FLOATING PARTICLES =====
        function createParticles(){
            const colors=['rgba(255,108,55,0.3)','rgba(79,168,255,0.2)','rgba(179,136,255,0.2)','rgba(255,215,64,0.15)'];
            for(let i=0;i<20;i++){
                const p=document.createElement('div');
                p.className='particle';
                const size=Math.random()*4+2;
                p.style.cssText=`
                    width:${size}px;height:${size}px;
                    left:${Math.random()*100}%;
                    background:${colors[Math.floor(Math.random()*colors.length)]};
                    animation-duration:${Math.random()*8+6}s;
                    animation-delay:${Math.random()*6}s;
                `;
                document.body.appendChild(p);
            }
        }
        createParticles();

        // ===== PASSWORD TOGGLE =====
        function togglePassword(){
            const inp=document.getElementById('password');
            const icon=document.getElementById('eyeIcon');
            if(inp.type==='password'){
                inp.type='text';
                icon.innerHTML='<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            }else{
                inp.type='password';
                icon.innerHTML='<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        // ===== LOGIN =====
        async function handleLogin(e){
            e.preventDefault();
            const btn=document.getElementById('loginBtn');
            const errBox=document.getElementById('errorMsg');
            const errText=document.getElementById('errorText');

            btn.disabled=true;
            btn.innerHTML='<span class="btn-spinner"></span>Signing in...';
            errBox.classList.remove('visible');

            const user=document.getElementById('username').value.trim();
            const pass=document.getElementById('password').value;

            try{
                const res=await fetch('/login',{
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body:JSON.stringify({username:user,password:pass})
                });
                const data=await res.json();

                if(data.success){
                    btn.innerHTML='&#10003; Success';
                    btn.style.background='linear-gradient(135deg,#00c853,#1b8a3d)';
                    setTimeout(()=>window.location.href='/',600);
                }else{
                    errText.textContent=data.message||'Invalid credentials';
                    errBox.classList.add('visible');
                    btn.disabled=false;
                    btn.innerHTML='Sign In';
                    // Shake the card
                    document.querySelector('.login-card').style.animation='shakeIn 0.4s ease';
                    setTimeout(()=>document.querySelector('.login-card').style.animation='',400);
                }
            }catch(err){
                errText.textContent='Connection error. Try again.';
                errBox.classList.add('visible');
                btn.disabled=false;
                btn.innerHTML='Sign In';
            }
        }

        // Enter key support
        document.addEventListener('keydown',e=>{
            if(e.key==='Enter'){
                document.getElementById('loginForm').requestSubmit();
            }
        });
    </script>
</body>
</html>
